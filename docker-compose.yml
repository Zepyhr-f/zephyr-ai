services:
  zephyr-ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: zephyr-ai:local
    container_name: zephyr-ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "127.0.0.1:${ZEPHYR_AI_PORT:-8000}:8000"
    volumes:
      - /app/logs/ai:/app/logs/ai
    networks:
      - infra_default
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  infra_default:
    external: true
